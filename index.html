<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL GALLETA — Legal</title>
<style>
  :root { --verde: #1a472a; --crema: #F5E6C8; --dorado: #FFD700; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--verde);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 440px;
    width: 100%;
    text-align: center;
  }
  .logo {
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--dorado);
    font-weight: 700;
    margin-bottom: 8px;
  }
  h1 { font-size: 34px; margin-bottom: 8px; }
  p.sub { color: var(--crema); margin-bottom: 36px; font-size: 15px; }
  a.btn {
    display: block;
    background: var(--crema);
    color: var(--verde);
    text-decoration: none;
    font-weight: 700;
    padding: 18px 24px;
    border-radius: 14px;
    margin-bottom: 16px;
    font-size: 16px;
    transition: transform 0.1s;
  }
  a.btn:hover { transform: translateY(-2px); }
  .foot { margin-top: 30px; font-size: 12px; color: rgba(245,230,200,0.6); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">EL GALLETA</div>
    <h1>Información legal</h1>
    <p class="sub">Fútbol amateur en Chile</p>
    <a class="btn" href="privacidad.html">Política de Privacidad</a>
    <a class="btn" href="terminos.html">Términos y Condiciones</a>
    <div class="foot">&copy; 2026 EL GALLETA. Todos los derechos reservados.</div>
  </div>
</body>
</html>
